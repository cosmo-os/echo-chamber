name: Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/configure-pages@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm test
      - run: npm run build:pages

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      # actions/deploy-pages@v5 still bundles @actions/artifact@2.x, which loads
      # Node's deprecated punycode module. See actions/deploy-pages#413.
      NODE_OPTIONS: --disable-warning=DEP0040
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment-retry-2.outputs.page_url || steps.deployment-retry-3.outputs.page_url || steps.deployment-retry-4.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before deploy retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 30

      - id: deployment-retry-2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before deploy retry
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry-2.outcome == 'failure'
        run: sleep 30

      - id: deployment-retry-3
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry-2.outcome == 'failure'
        uses: actions/deploy-pages@v5
        continue-on-error: true

      - name: Wait before deploy retry
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry-2.outcome == 'failure' && steps.deployment-retry-3.outcome == 'failure'
        run: sleep 30

      - id: deployment-retry-4
        if: steps.deployment.outcome == 'failure' && steps.deployment-retry-2.outcome == 'failure' && steps.deployment-retry-3.outcome == 'failure'
        uses: actions/deploy-pages@v5